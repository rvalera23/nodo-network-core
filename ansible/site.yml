---
- name: Automatización Nodo Network Core (Estructura Uniforme)
  hosts: all
  become: yes
  tasks:
    - name: FASE 1 - Instalar dependencias
      apt:
        name: [docker.io, docker-compose, python3-pip, git]
        state: present
        update_cache: yes

    - name: FASE 3 - Crear estructura de persistencia y backups
      file:
        path: "/opt/servicios/nodo-network-core/{{ item }}"
        state: directory
        mode: '0755'
      with_items:
        - 'kea/config'
        - 'kea/data'
        - 'coredns/config'
        - 'backups'
        - 'backups/network_config'

    - name: FASE 4 - Pull de imágenes
      shell: "docker pull iscprojects/kea:latest && docker pull coredns/coredns:latest"

    - name: FASE 5 - Lanzamiento del servicio
      shell: "cd /opt/servicios/nodo-network-core && docker compose up -d"

    - name: FASE 6 - Asegurar permisos unificados
      file:
        path: "/opt/servicios/nodo-network-core"
        state: directory
        owner: "root"
        group: "root"
        recurse: yes
